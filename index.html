<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Article preview component</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

</head>

<body>
  <main id="container">
    <div class="preview-image">
      <img src="images/drawers.jpg" alt="desk drawers">
    </div>
    <div class="preview-description">
      <h4>Shift the overall look and feel by adding these wonderful
        touches to furniture in your home</h4>
      <p>Ever been in a room and felt like something was missing? Perhaps
        it felt slightly bare and uninviting. I’ve got some simple tips
        to help you make any room feel complete.</p>
      <div class="profile">
        <img src="images/avatar-michelle.jpg" class="avatar" alt="profile picture">
        <div class="profile-description">
          <p>Michelle Appleton</p>
          <p>28 Jun 2020</p>
        </div>
        <button><img src="images/icon-share.svg" alt="share icon button"></button>
      </div>
    </div>
  </main>
</body>

</html>
